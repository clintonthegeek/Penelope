name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add KDE Neon repo (Qt6 + KF6)
        run: |
          # Ubuntu 24.04 ships Qt 6.4 and no KF6. KDE Neon provides Qt 6.8+
          # and KF6 as a coherent set — pin high so the full stack is used.
          wget -qO- https://archive.neon.kde.org/public.key \
            | sudo tee /etc/apt/trusted.gpg.d/kde-neon.asc >/dev/null
          echo "deb https://archive.neon.kde.org/user noble main" \
            | sudo tee /etc/apt/sources.list.d/kde-neon.list

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build pkg-config dpkg-dev \
            qt6-base-dev \
            extra-cmake-modules \
            libkf6coreaddons-dev libkf6i18n-dev libkf6xmlgui-dev \
            libkf6widgetsaddons-dev libkf6iconthemes-dev \
            libkf6config-dev libkf6configwidgets-dev \
            libkf6kio-dev libkf6syntaxhighlighting-dev \
            libkf6dbusaddons-dev \
            libmd4c-dev libhyphen-dev \
            libpoppler-qt6-dev \
            libfreetype-dev libicu-dev zlib1g-dev \
            libfontconfig-dev libharfbuzz-dev

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Configure
        run: |
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -G Ninja

      - name: Build
        run: cmake --build build --parallel

      # ── .deb via CPack ──────────────────────────────────────────────
      - name: Package .deb
        run: cd build && cpack -G DEB

      # ── AppImage via linuxdeploy ────────────────────────────────────
      - name: Install to AppDir
        run: DESTDIR=${{ github.workspace }}/AppDir cmake --install build

      - name: Download linuxdeploy
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-*.AppImage

      - name: Build AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
          NO_STRIP: "1"
          QMAKE: /usr/lib/qt6/bin/qmake
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --plugin qt \
            --output appimage \
            --desktop-file AppDir/usr/share/applications/org.penelope.Penelope.desktop \
            --icon-file AppDir/usr/share/icons/hicolor/scalable/apps/penelope.svg

      # ── Upload release ──────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            build/penelope_*.deb
            Penelope-*.AppImage
